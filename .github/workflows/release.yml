name: Create Release
on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        type: string
        required: true
      snapshotVersion:
        description: 'Snapshot version to update to'
        type: string
        required: true
#      sonatypeUsername:
#        description: 'Sonatype username'
#        type: string
#        required: true
#      sonatypePassword:
#        description: 'Sonatype password'
#        type: string
#        required: true

