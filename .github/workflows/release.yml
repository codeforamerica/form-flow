      - name: Confirm version ${{ inputs.version }} published to Sonatype
        timeout-minutes: 5
        run: |
          until curl -s -f -o /dev/null "https://central.sonatype.com/artifact/org.codeforamerica.platform/form-flow/${{inputs.version}}"
          do
            echo "Waiting for version ${{ inputs.version }} to be published to Sonatype..."
            sleep 5
          done
      - name: "Announce failure to release of ${{inputs.version}} to #platform-help"
        uses: ravsamhq/notify-slack-action@v2
        if: failure()
        with:
          status: ${{ job.status }}
          notification_title: "form-flow version ${{inputs.version}} release failed!"
          footer: "Github: <{repo_url}|{repo}> | <{workflow_url}|Workflow> | <{repo_url}/releases/tag/${{inputs.version}}|Release Notes> "
          mention_groups: "S03PFJ5DFLZ,S04PD39SC64"
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  post_release_success:
    name: Clean up after release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main
          fetch-depth: 0
      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{inputs.version}}
          draft: false
          prerelease: false
      - name: Update version after publish
        run: |
          sed -i 's/version = "\(.*\)"/version = "${{ inputs.snapshotVersion }}-SNAPSHOT"/' build.gradle
          echo "//this is a test" >> build.gradle
      - name: Create PR to bump version
        id: version_bump
        uses: peter-evans/create-pull-request@v5.0.2
        with:
          title: "Bump version to ${{inputs.snapshotVersion}}-SNAPSHOT"
          commit-message: "Bump version to ${{inputs.snapshotVersion}}-SNAPSHOT"
          committer: CfA Platforms Robot <platforms-robot@codeforamerica.org>
          branch: "bump-snapshot-to-${{inputs.snapshotVersion}}-SNAPSHOT"
          body: Auto-generated by ${{ inputs.version }} release workflow
          delete-branch: true
          labels: automerge
          token: ${{ steps.generate-token.outputs.token }}
      - name: 'Wait for status checks'
        id: waitforstatuschecks
        uses: "WyriHaximus/github-action-wait-for-status@v1.8"
        with:
          checkInterval: 30
          ignoreActions: "automerge"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      - name: automerge
        uses: "pascalgn/automerge-action@v0.15.6"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Announce successful release of ${{inputs.version}} to #platform-help"
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notification_title: "form-flow version ${{inputs.version}} released! :tada::platypus_roll::tada:"
          footer: "Github: <{repo_url}|{repo}> | <{workflow_url}|Workflow> | <{repo_url}/releases/tag/${{inputs.version}}|Release Notes> "
          mention_groups: "S03PFJ5DFLZ,S04PD39SC64"
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}